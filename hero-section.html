<!-- hero-section.html -->
<section class="hero" id="home" aria-label="হিরো সেকশন">
    <div class="hero-background">
        <div class="hero-overlay"></div>
        <!-- ব্যাকগ্রাউন্ড ইমেজ (CSS-তে সেট করা হবে) -->
         <link rel="stylesheet" href="hero-section.css" />
    </div>
    
    <div class="hero-container container">
        <div class="hero-content">
            <!-- ব্যাজ/ট্যাগ -->
            <div class="hero-badge" data-aos="fade-down">
                <i class="fas fa-mosque"></i>
                <span>দারুল ইত্তিহাদ ফাউন্ডেশন</span>
            </div>

            <!-- প্রধান শিরোনাম -->
            <h1 class="hero-title" data-aos="fade-up" data-aos-delay="100">
                <span class="title-highlight">একতার ভিত্তিতে</span>
                <span class="title-main">সমৃদ্ধ সমাজ</span>
            </h1>

            <!-- সাবটাইটেল -->
            <p class="hero-subtitle" data-aos="fade-up" data-aos-delay="200">
                মানবিক মূল্যবোধ, সামাজিক ন্যায়বিচার ও টেকসই উন্নয়নে 
                আমাদের অঙ্গীকার
            </p>

            <!-- ট্যাগলাইন (মূলমন্ত্র) -->
            <div class="hero-tagline" data-aos="fade-up" data-aos-delay="300">
                <span class="tag-item">
                    <i class="fas fa-handshake"></i>
                    <span>ঐক্য</span>
                </span>
                <span class="tag-divider">•</span>
                <span class="tag-item">
                    <i class="fas fa-users"></i>
                    <span>সেবা</span>
                </span>
                <span class="tag-divider">•</span>
                <span class="tag-item">
                    <i class="fas fa-chart-line"></i>
                    <span>সমৃদ্ধি</span>
                </span>
            </div>

            <!-- CTA বাটনসমূহ -->
            <div class="hero-buttons" data-aos="fade-up" data-aos-delay="400">
                <a href="membership.html" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i>
                    <span>যোগ দিন</span>
                </a>
                <a href="donate.html" class="btn btn-secondary">
                    <i class="fas fa-heart"></i>
                    <span>দান করুন</span>
                </a>
            </div>

            <!-- পরিসংখ্যান (ঐচ্ছিক) -->
            <div class="hero-stats" data-aos="fade-up" data-aos-delay="500">
                <div class="stat-item">
                    <span class="stat-number" data-count="500">০</span>
                    <span class="stat-label">সদস্য</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" data-count="120">০</span>
                    <span class="stat-label">প্রকল্প</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" data-count="50">০</span>
                    <span class="stat-label">স্বেচ্ছাসেবক</span>
                </div>
            </div>
        </div>
    </div>

    <!-- স্ক্রল ইন্ডিকেটর -->
    <div class="scroll-indicator" aria-hidden="true">
        <span class="scroll-text">নিচে স্ক্রল করুন</span>
        <div class="scroll-mouse">
            <div class="scroll-wheel"></div>
        </div>
        <div class="scroll-arrows">
            <span class="arrow"></span>
            <span class="arrow"></span>
            <span class="arrow"></span>
        </div>
    </div>
    <script src="hero-section.js"></script>
</section>
